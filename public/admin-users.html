            <option value="user">Пользователь</option>
            <option value="moderator">Модератор</option>
            <option value="admin">Администратор</option>
        </select>
        <select id="filter-blocked" class="filter-select">
            <option value="">Все статусы</option>
            <option value="0">Активные</option>
            <option value="1">Заблокированные</option>
        </select>
    </section>

    <!-- Таблица -->

        <div class="section-title">
            <span>Пользователи</span>
            <span id="admin-users-count" class="section-count">Найдено 0</span>
        </div>

        <div id="users-table-container" class="admin-users-table">
