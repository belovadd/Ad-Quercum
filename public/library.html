<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="">
    <title>Моя библиотека — Ad Quercum</title>

    <link rel="icon" href="../assets/images/favicon.ico?v=release" sizes="any">
    <link rel="icon" href="../assets/images/favicon-512x512.png?v=release" type="image/png" sizes="512x512">
    <link rel="apple-touch-icon" href="../assets/images/apple-touch-icon.png?v=release">
    <meta name="theme-color" content="#5B8C5A">

    <link rel="stylesheet" href="../assets/fonts/fonts.css?v=release">
    <link rel="stylesheet" href="../assets/css/global.css?v=release">
    <link rel="stylesheet" href="../assets/css/components.css?v=release">
    <link rel="stylesheet" href="../assets/css/domain.css?v=release">
    <link rel="stylesheet" href="../assets/css/layouts.css?v=release">

    <script src="../assets/js/vendor/lucide.min.js?v=release"></script>
</head>
<body class="is-app-booting">

<!-- ========================================================================= -->
<!-- === 🧱 1. НАВИГАЦИЯ === -->
<!-- ========================================================================= -->

<div id="navigation"></div>

<!-- ========================================================================= -->
<!-- === 🧱 2. КОНТЕНТ === -->
<!-- ========================================================================= -->

<main class="container library-page">

    <nav class="breadcrumb">
        <a href="index.html">Главная</a>
        <span class="breadcrumb-separator">/</span>
        <span>Библиотека</span>
    </nav>

    <header class="library-header">
        <h1 class="library-title">
            Моя библиотека
            <span id="library-count" class="library-count"></span>
        </h1>
        <div class="library-header-actions">
            <div
                id="library-mode-filter"
                class="library-filters library-mode-filter"
                aria-label="Режим библиотеки"
            ></div>
            <button id="add-book-button" class="btn btn-primary" type="button">
                <i data-lucide="plus"></i>
                Добавить
            </button>
        </div>
    </header>

    <section class="library-toolbar">
        <div class="library-search">
            <div class="library-search-wrap">
                <i data-lucide="search"></i>
                <input
                    id="search-input"
                    class="form-input library-search-input"
                    type="text"
                    placeholder="Поиск по названию или автору…"
                    autocomplete="off"
                >
            </div>
        </div>

        <div class="library-filters" aria-label="Фильтры библиотеки">
            <span class="library-filter-label">Статус:</span>
            <div id="status-filter" class="filter-chip-group"></div>

            <span class="library-filter-label">Язык:</span>
            <div id="language-filter" class="filter-chip-group"></div>

            <span class="library-filter-label">Жанр:</span>
            <div id="genre-filter" class="filter-chip-group"></div>
        </div>
    </section>

    <section id="books-list" class="card-grid"></section>

    <nav id="pagination" class="pagination" aria-label="Пагинация"></nav>

</main>

<!-- ========================================================================= -->
<!-- === 🧱 3. СКРИПТЫ === -->
<!-- ========================================================================= -->

<!-- Core -->
<script src="../assets/js/core/constants.js?v=release"></script>
<script src="../assets/js/core/api_client.js?v=release"></script>
<script src="../assets/js/core/page_registry.js?v=release"></script>
<script src="../assets/js/core/router.js?v=release"></script>
<script src="../assets/js/core/auth_guard.js?v=release"></script>
<script src="../assets/js/core/notification.js?v=release"></script>
<script src="../assets/js/core/utils.js?v=release"></script>

<!-- Services -->
<script src="../assets/js/services/auth_service.js?v=release"></script>
<script src="../assets/js/services/book_service.js?v=release"></script>
<script src="../assets/js/services/library_service.js?v=release"></script>

<!-- Components -->
<script src="../assets/js/services/social_service.js?v=release"></script>
<script src="../assets/js/components/navigation_component.js?v=release"></script>
<script src="../assets/js/components/empty_state_component.js?v=release"></script>
<script src="../assets/js/components/book_card_component.js?v=release"></script>
<script src="../assets/js/components/pagination_component.js?v=release"></script>

<!-- Page -->
<script src="../assets/js/pages/library.js?v=release"></script>

</body>
</html>
