 *

 *   1. ПЕРЕКЛЮЧАТЕЛЬ ТЕМЫ
 *   2. ФОРМА РЕГИСТРАЦИИ
 *   3. СКРИПТЫ
 -->
<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="">
    <title>Регистрация — Ad Quercum</title>

    <link rel="icon" href="../assets/images/favicon.ico?v=release" sizes="any">
    <link rel="icon" href="../assets/images/favicon-512x512.png?v=release" type="image/png" sizes="512x512">
    <link rel="apple-touch-icon" href="../assets/images/apple-touch-icon.png?v=release">
    <meta name="theme-color" content="#5B8C5A">

    <link rel="stylesheet" href="../assets/fonts/fonts.css?v=release">
    <link rel="stylesheet" href="../assets/css/global.css?v=release">
    <link rel="stylesheet" href="../assets/css/components.css?v=release">
    <link rel="stylesheet" href="../assets/css/domain.css?v=release">
    <link rel="stylesheet" href="../assets/css/layouts.css?v=release">

    <script src="../assets/js/vendor/lucide.min.js?v=release"></script>
</head>
<body class="auth-body is-app-booting">

<!-- ========================================================================= -->
<!-- === 🧱 1. ПЕРЕКЛЮЧАТЕЛЬ ТЕМЫ === -->
<!-- ========================================================================= -->

<button id="theme-toggle-button" class="theme-toggle" type="button" title="Переключить тему">
    <i data-lucide="moon"></i>
</button>

<!-- ========================================================================= -->
<!-- === 🧱 2. ФОРМА РЕГИСТРАЦИИ === -->
<!-- ========================================================================= -->

<div class="auth-wrapper">
    <div class="auth-card">

        <div class="auth-logo">Ad Quercum</div>
        <p class="auth-subtitle">Создайте аккаунт и начните путь к Дубу</p>

        <form id="register-form" class="auth-form" novalidate>
            <div class="form-field">
                <label class="form-label" for="profile-identifier">Имя пользователя</label>
                <input id="profile-identifier" class="form-input" type="text"
                       name="user_profile_identifier" placeholder="bookworm42"
                       autocomplete="username" required>
                <p class="form-hint">Латиница, цифры и подчёркивания. 3-30 символов</p>
                <p id="profile-identifier-error" class="form-error"></p>
            </div>

            <div class="form-field">
                <label class="form-label" for="email">Email</label>
                <input id="email" class="form-input" type="email" name="user_email"
                       placeholder="you@example.com" autocomplete="email" required>
                <p id="email-error" class="form-error"></p>
            </div>

            <div class="form-field">
                <label class="form-label" for="password">Пароль</label>
                <input id="password" class="form-input" type="password" name="password"
                       placeholder="Пароль" autocomplete="new-password" required>
                <p id="password-hint" class="form-hint"></p>
                <p id="password-error" class="form-error"></p>
            </div>

            <div class="auth-consents" aria-label="Правовые подтверждения">
                <label class="auth-consent" for="terms-accepted">
                    <input id="terms-accepted" type="checkbox" name="terms_accepted" required>
                    <span>
                        Я ознакомился(лась) и принимаю
                        <a href="terms.html" target="_blank" rel="noopener">Пользовательское соглашение</a>
                    </span>
                </label>
                <p id="terms-accepted-error" class="form-error"></p>

                <label class="auth-consent" for="personal-data-accepted">
                    <input id="personal-data-accepted" type="checkbox" name="personal_data_accepted" required>
                    <span>
                        Я даю
                        <a href="personal-data-consent.html" target="_blank" rel="noopener">согласие на обработку персональных данных</a>
                    </span>
                </label>
                <p id="personal-data-accepted-error" class="form-error"></p>
            </div>

            <p id="form-error" class="form-error"></p>

            <button id="submit-button" class="btn btn-primary btn-block btn-lg" type="submit">
                <i data-lucide="user-plus"></i>
                Создать аккаунт
            </button>
        </form>

        <div class="auth-divider">или</div>

        <div class="auth-footer">
            Уже есть аккаунт? <a href="login.html">Войти</a>
        </div>

    </div>
</div>

<!-- ========================================================================= -->
<!-- === 🧱 3. СКРИПТЫ === -->
<!-- ========================================================================= -->

<script src="../assets/js/core/constants.js?v=release"></script>
<script src="../assets/js/core/api_client.js?v=release"></script>
<script src="../assets/js/core/page_registry.js?v=release"></script>
<script src="../assets/js/core/router.js?v=release"></script>
<script src="../assets/js/core/auth_guard.js?v=release"></script>
<script src="../assets/js/core/notification.js?v=release"></script>
<script src="../assets/js/core/utils.js?v=release"></script>
<script src="../assets/js/core/theme_toggle.js?v=release"></script>
<script src="../assets/js/services/auth_service.js?v=release"></script>
<script src="../assets/js/pages/register.js?v=release"></script>
<script>if (window.lucide) window.lucide.createIcons();</script>

</body>
</html>
