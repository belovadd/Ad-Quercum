<p>Загрузка...</p>

<!-- ========================================================================= -->
<!-- === 🧱 2. РЕДИРЕКТ === -->
<!-- ========================================================================= -->

<script>
    /**
     * 🟨 Определяет базовый путь приложения для корня, public/index.html и поддиректорий.
     *
     * @returns {string} Базовый путь приложения.
     */
    function resolveBasePath() {
        const path = window.location.pathname;
        const marker = 'public/index.html';
        const idx = path.indexOf(marker);

        if (idx !== -1) {
            return path.substring(0, idx);
        }

        return path.endsWith('/') ? path : path + '/';
    }

    /**
     * 🟨 Загружает JS-файл от вычисленного базового пути.
     *
     * @param {string} src Адрес скрипта.
     * @returns {Promise<void>} Promise загрузки.
     */
    function loadScript(src) {
        return new Promise(function (resolve, reject) {
            const script = document.createElement('script');
            script.src = src;
            script.onload = function () { resolve(); };
            script.onerror = function () { reject(new Error('Не удалось загрузить ' + src)); };
            document.body.appendChild(script);
        });
    }

    /**
     * 🟨 Загружает сервисный слой, проверяет сессию и перенаправляет пользователя.
     *
     * @returns {Promise<void>} Ничего не возвращает.
     */
    async function redirectBySession() {
        const base = resolveBasePath();

        try {
            await loadScript(base + 'assets/js/core/constants.js?v=release');
            await loadScript(base + 'assets/js/core/api_client.js?v=release');
            await loadScript(base + 'assets/js/services/auth_service.js?v=release');

            const session = await AuthService.checkSession();
            if (session && session.is_authenticated) {
                window.location.href = PAGE_URL.LIBRARY;
            } else {
                window.location.href = PAGE_URL.LOGIN;
            }
        } catch (e) {
            window.location.href = base + 'public/login.html';
        }
    }

    redirectBySession();
</script>
</body>
</html>
