<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="">
    <title>Коллекции — Ad Quercum</title>

    <link rel="icon" href="../assets/images/favicon.ico?v=release" sizes="any">
    <link rel="icon" href="../assets/images/favicon-512x512.png?v=release" type="image/png" sizes="512x512">
    <link rel="apple-touch-icon" href="../assets/images/apple-touch-icon.png?v=release">
    <meta name="theme-color" content="#5B8C5A">

    <link rel="stylesheet" href="../assets/fonts/fonts.css?v=release">
    <link rel="stylesheet" href="../assets/css/global.css?v=release">
    <link rel="stylesheet" href="../assets/css/components.css?v=release">
    <link rel="stylesheet" href="../assets/css/domain.css?v=release">
    <link rel="stylesheet" href="../assets/css/layouts.css?v=release">

    <script src="../assets/js/vendor/lucide.min.js?v=release"></script>
</head>
<body class="is-app-booting">

<!-- ========================================================================= -->
<!-- === 🧱 1. НАВИГАЦИЯ === -->
<!-- ========================================================================= -->

<div id="navigation"></div>

<!-- ========================================================================= -->
<!-- === 🧱 2. КОНТЕНТ === -->
<!-- ========================================================================= -->

<main class="container collections-page">

    <nav class="breadcrumb">
        <a href="index.html">Главная</a>
        <span class="breadcrumb-separator">/</span>
        <span>Коллекции</span>
    </nav>

    <header class="collections-header">
        <h1 class="collections-title">Мои коллекции <span id="collections-count" class="section-card-count"></span></h1>
    </header>

    <section id="create-collection-section" class="create-form is-hidden">
        <h2 class="create-form-title">Новая коллекция</h2>
        <form id="create-collection-form" class="create-form-fields">
            <div class="form-field">
                <label class="form-label" for="create-collection-name">Название</label>
                <input id="create-collection-name" class="form-input" type="text" maxlength="255" required>
            </div>
            <div class="form-field">
                <label class="form-label" for="create-collection-description">Описание</label>
                <textarea id="create-collection-description" class="form-input form-textarea" rows="3"></textarea>
            </div>
            <div class="form-field">
                <label class="form-toggle">
                    <input id="create-collection-private" type="checkbox" checked hidden>
                    <span class="form-toggle-track"><span class="form-toggle-dot"></span></span>
                    <span class="form-toggle-label">Приватная коллекция</span>
                </label>
            </div>
            <div class="create-form-actions">
                <button type="button" id="cancel-create-collection-button" class="btn btn-outlined btn-sm">Отмена</button>
                <button type="submit" class="btn btn-primary btn-sm">Создать</button>
            </div>
        </form>
    </section>

    <!-- Сетка коллекций — рендерит pages/collections.js -->
    <section id="collections-list" class="collections-grid"></section>

    <!-- Детали выбранной коллекции — рендерит pages/collections.js -->
    <section id="collection-details" class="section-card is-hidden"></section>

</main>

<!-- ========================================================================= -->
<!-- === 🧱 3. СКРИПТЫ === -->
<!-- ========================================================================= -->

<script src="../assets/js/core/constants.js?v=release"></script>

<script src="../assets/js/core/notification.js?v=release"></script>
<script src="../assets/js/core/app_confirm.js?v=release"></script>
<script src="../assets/js/core/utils.js?v=release"></script>

<!-- Services -->
<script src="../assets/js/services/auth_service.js?v=release"></script>
<script src="../assets/js/services/library_service.js?v=release"></script>

<!-- Components -->
<script src="../assets/js/services/social_service.js?v=release"></script>
<script src="../assets/js/components/navigation_component.js?v=release"></script>
<script src="../assets/js/components/empty_state_component.js?v=release"></script>
<script src="../assets/js/components/card_mini_component.js?v=release"></script>

<!-- Page -->
<script src="../assets/js/pages/collections.js?v=release"></script>

</body>
</html>
