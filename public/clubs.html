<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="">
    <title>Клубы — Ad Quercum</title>

    <link rel="icon" href="../assets/images/favicon.ico?v=release" sizes="any">
    <link rel="icon" href="../assets/images/favicon-512x512.png?v=release" type="image/png" sizes="512x512">
    <link rel="apple-touch-icon" href="../assets/images/apple-touch-icon.png?v=release">
    <meta name="theme-color" content="#5B8C5A">

    <link rel="stylesheet" href="../assets/fonts/fonts.css?v=release">
    <link rel="stylesheet" href="../assets/css/global.css?v=release">
    <link rel="stylesheet" href="../assets/css/components.css?v=release">
    <link rel="stylesheet" href="../assets/css/domain.css?v=release">
    <link rel="stylesheet" href="../assets/css/layouts.css?v=release">

    <script src="../assets/js/vendor/lucide.min.js?v=release"></script>
</head>
<body class="is-app-booting">

<!-- ========================================================================= -->
<!-- === 🧱 1. НАВИГАЦИЯ === -->
<!-- ========================================================================= -->

<div id="navigation"></div>

<!-- ========================================================================= -->
<!-- === 🧱 2. КОНТЕНТ === -->
<!-- ========================================================================= -->

<main class="container clubs-page">

    <nav class="breadcrumb">
        <a href="index.html">Главная</a>
        <span class="breadcrumb-separator">/</span>
        <span>Клубы</span>
    </nav>

    <header class="library-header">
        <h1 class="library-title">
            Клубы
            <span id="clubs-count" class="library-count"></span>
        </h1>
        <button id="toggle-create-form-button" class="btn btn-primary" type="button">
            <i data-lucide="plus"></i>
            Создать клуб
        </button>
    </header>

    <!-- Форма создания клуба -->
    <section id="create-club-section" class="create-form is-hidden">
        <h2 class="create-form-title">Новый клуб</h2>
        <form id="create-club-form" class="clubs-form">
            <div class="form-field">
                <label class="form-label" for="create-club-name">Название клуба</label>
                <input id="create-club-name" class="form-input" type="text" maxlength="255"
                       placeholder="Введите название клуба..." required>
            </div>
            <div class="form-field">
                <label class="form-label" for="create-club-description">Описание</label>
                <textarea id="create-club-description" class="form-input form-textarea"
                          maxlength="2000" rows="3"
                          placeholder="Расскажите о клубе..."></textarea>
            </div>
            <div class="form-field">
                <label class="form-toggle">
                    <input id="create-club-public" type="checkbox" checked hidden>
                    <span class="form-toggle-track"><span class="form-toggle-dot"></span></span>
                    <span class="form-toggle-label">Публичный клуб</span>
                </label>
            </div>
            <div class="create-form-actions">
                <button type="button" id="cancel-create-button" class="btn btn-outlined btn-sm">Отмена</button>
                <button type="submit" class="btn btn-primary btn-sm">
                    <i data-lucide="plus"></i>
                    Создать
                </button>
            </div>
        </form>
    </section>

    <!-- Поиск и фильтры клубов -->
    <div class="search-box clubs-search-box">
        <span class="search-box-icon"><i data-lucide="search"></i></span>
        <input id="club-search-input" class="search-box-input" type="text"
               placeholder="Найти клуб..." autocomplete="off">
    </div>

    <!-- Каталог клубов -->
    <section class="content-section">
        <header class="section-header clubs-catalog-header">
            <div class="section-title">
                <span id="clubs-section-title">Клубы</span>
                <span id="clubs-total-count" class="section-count">Найдено 0</span>
            </div>
            <div class="library-filters clubs-filters" aria-label="Фильтры клубов">
                <div id="club-filter-group" class="filter-chip-group"></div>
            </div>
        </header>

        <div id="clubs-catalog-list" class="clubs-grid"></div>
    </section>

    <nav id="clubs-catalog-pagination" class="pagination" aria-label="Пагинация"></nav>

</main>

<!-- ========================================================================= -->
<!-- === 🧱 3. СКРИПТЫ === -->
<!-- ========================================================================= -->

<script src="../assets/js/core/constants.js?v=release"></script>
<script src="../assets/js/core/api_client.js?v=release"></script>

<script src="../assets/js/core/utils.js?v=release"></script>

<script src="../assets/js/services/club_service.js?v=release"></script>

<script src="../assets/js/services/social_service.js?v=release"></script>

<script src="../assets/js/components/empty_state_component.js?v=release"></script>
<script src="../assets/js/components/pagination_component.js?v=release"></script>
<script src="../assets/js/components/club_card_component.js?v=release"></script>

<!-- Page -->
<script src="../assets/js/pages/clubs.js?v=release"></script>

</body>
