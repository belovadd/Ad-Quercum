<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="">

    <link rel="icon" href="../assets/images/favicon.ico?v=release" sizes="any">
    <link rel="icon" href="../assets/images/favicon-512x512.png?v=release" type="image/png" sizes="512x512">
    <link rel="apple-touch-icon" href="../assets/images/apple-touch-icon.png?v=release">

    <link rel="stylesheet" href="../assets/fonts/fonts.css?v=release">
    <link rel="stylesheet" href="../assets/css/global.css?v=release">

<!-- ========================================================================= -->
<!-- === 🧱 1. НАВИГАЦИЯ === -->
<!-- ========================================================================= -->

<div id="navigation"></div>

<!-- ========================================================================= -->
<!-- === 🧱 2. КОНТЕНТ === -->
<!-- ========================================================================= -->

<main class="container friends-page">

    <nav class="breadcrumb">
        <a href="index.html">Главная</a>
        <span class="breadcrumb-separator">/</span>
        <span>Друзья</span>
    </nav>

    <header class="page-header friends-header">
        <h1 class="page-header-title">Друзья</h1>
    </header>

    <!-- Поиск пользователей -->
    <section class="friends-search-section">
        <div class="search-box">
            <span class="search-box-icon"><i data-lucide="search"></i></span>
            <input id="user-search-input" class="search-box-input" type="text"
                   placeholder="Найти пользователя по имени или @handle..." autocomplete="off">
        </div>

        <div id="search-results" class="search-results is-hidden"></div>
    </section>

    <!-- Входящие запросы -->
    <section id="incoming-requests-section" class="content-section">
        <header class="section-header">
            <div class="section-title">
                Входящие запросы
                <span id="incoming-count" class="tag tag-muted section-count-badge"></span>
            </div>
        </header>
        <div id="incoming-requests" class="friend-list"></div>
    </section>

    <!-- Исходящие запросы -->
    <section id="outgoing-requests-section" class="content-section">
        <header class="section-header">
            <div class="section-title">
                Исходящие запросы
                <span id="outgoing-count" class="tag tag-muted section-count-badge"></span>
            </div>
        </header>
        <div id="outgoing-requests" class="friend-list"></div>
    </section>

    <!-- Мои друзья -->
    <section class="content-section">
        <header class="section-header">
            <div class="section-title">
                Мои друзья
                <span id="friends-total-count" class="tag tag-muted section-count-badge"></span>
            </div>
        </header>

        <div id="friends-list" class="friend-list"></div>
        <nav id="friends-pagination" class="pagination" aria-label="Пагинация"></nav>
    </section>

</main>
