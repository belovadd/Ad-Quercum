    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="">

    <link rel="icon" href="../assets/images/favicon.ico?v=release" sizes="any">
    <link rel="icon" href="../assets/images/favicon-512x512.png?v=release" type="image/png" sizes="512x512">
    <link rel="apple-touch-icon" href="../assets/images/apple-touch-icon.png?v=release">

    <link rel="stylesheet" href="../assets/fonts/fonts.css?v=release">

<!-- ========================================================================= -->
<!-- === 🧱 1. НАВИГАЦИЯ === -->
<!-- ========================================================================= -->

<div id="navigation"></div>

<!-- ========================================================================= -->
<!-- === 🧱 2. КОНТЕНТ === -->
<!-- ========================================================================= -->

<main class="container book-page">

    <nav class="breadcrumb">
        <a href="library.html">Библиотека</a>
        <span class="breadcrumb-separator">/</span>
        <span>Произведение</span>
    </nav>

    <!-- Шапка произведения: cover + title/author + meta + actions (рендерит work_header_component) -->
    <section id="work-header"></section>

    <!-- Статус чтения -->
    <section class="section-card">
        <header class="section-card-header">
            <div class="section-card-title">Статус чтения</div>
        </header>
        <div id="reading-status-row" class="status-row"></div>
    </section>

    <!-- Обёртка для сетки изданий: саму .editions-grid создаёт pages/book.js -->
    <section class="section-card">
        <header class="section-card-header">
            <h2 class="section-card-title">
                Издания <span id="editions-count" class="section-card-count"></span>
            </h2>
            <button id="add-edition-button" class="btn btn-primary btn-sm" type="button">
                <i data-lucide="plus"></i>
                Добавить издание
            </button>
        </header>
        <div id="editions-grid"></div>
    </section>

    <!-- Секция «Ваша оценка» -->
    <section id="rate-form-section" class="section-card rate-form-section">
        <header class="section-card-header">
            <h2 class="section-card-title">Ваша оценка</h2>
        </header>
        <div id="rate-form-container"></div>
    </section>

    <!-- Секция «Рецензии» -->
    <section class="section-card reviews-section">
        <header class="section-card-header">
            <div>
                <h2 class="section-card-title">Рецензии</h2>
                <p class="section-card-subtitle">Отзывы читателей произведения</p>
            </div>
        </header>
        <div id="rates-list" class="rates-list"></div>
    </section>

    <!-- Секция «Заметки» -->
    <section class="notes-section">
        <header class="notes-header">
            <div class="notes-title-wrap">
                <h2 class="notes-title">Заметки</h2>
                <span id="notes-count" class="notes-count">0</span>
            </div>
            <div id="notes-filters" class="notes-filters" aria-label="Фильтр заметок">
                <button class="notes-filter is-active" type="button" data-note-filter="all">Все</button>
                <button class="notes-filter" type="button" data-note-filter="quote">Цитаты</button>
                <button class="notes-filter" type="button" data-note-filter="thought">Рассуждения</button>
                <button class="notes-filter" type="button" data-note-filter="question">Вопросы</button>
                <button class="notes-filter" type="button" data-note-filter="idea">Идеи</button>
            </div>
        </header>
        <div id="notes-list" class="notes-list"></div>
    </section>

</main>

<script src="../assets/js/pages/book.js?v=release"></script>
