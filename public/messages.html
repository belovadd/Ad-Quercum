<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="">
    <title>Сообщения — Ad Quercum</title>

    <link rel="icon" href="../assets/images/favicon.ico?v=release" sizes="any">
    <link rel="icon" href="../assets/images/favicon-512x512.png?v=release" type="image/png" sizes="512x512">
    <link rel="apple-touch-icon" href="../assets/images/apple-touch-icon.png?v=release">
    <meta name="theme-color" content="#5B8C5A">

    <link rel="stylesheet" href="../assets/fonts/fonts.css?v=release">
    <link rel="stylesheet" href="../assets/css/global.css?v=release">
    <link rel="stylesheet" href="../assets/css/components.css?v=release">
    <link rel="stylesheet" href="../assets/css/domain.css?v=release">
    <link rel="stylesheet" href="../assets/css/layouts.css?v=release">

    <script src="../assets/js/vendor/lucide.min.js?v=release"></script>
</head>
<body class="is-app-booting">

<!-- ========================================================================= -->
<!-- === 🧱 1. НАВИГАЦИЯ === -->
<!-- ========================================================================= -->

<div id="navigation"></div>

<!-- ========================================================================= -->
<!-- === 🧱 2. КОНТЕНТ === -->
<!-- ========================================================================= -->

<main class="container messages-page">

    <nav class="breadcrumb">
        <a href="index.html">Главная</a>
        <span class="breadcrumb-separator">/</span>
        <span>Сообщения</span>
    </nav>

    <header class="page-header">
        <h1 class="page-header-title">Сообщения</h1>
    </header>

    <div class="chat-layout is-contacts-open">

        <!-- Левая панель: список бесед -->
        <aside class="chat-sidebar">
            <header class="chat-sidebar-header">Беседы</header>
            <div id="conversations-list" class="chat-conversations"></div>
        </aside>

        <!-- Правая панель: текущий чат -->
        <section class="chat-main">

            <header id="chat-header" class="chat-header">
                <button id="chat-back-button" class="btn btn-ghost btn-icon chat-back-button"
                        type="button" aria-label="Вернуться к беседам">
                    <i data-lucide="arrow-left"></i>
                </button>
                <a id="chat-header-avatar" class="chat-header-avatar user-avatar friend-avatar-link is-hidden"
                   href="profile.html" aria-label="Открыть профиль"></a>
                <div class="chat-header-info">
                    <h2 id="chat-header-name" class="chat-header-name">Сообщения</h2>
                    <p class="chat-header-status">Выберите беседу слева</p>
                </div>
            </header>

            <div id="messages-list" class="chat-messages">
                <p class="messages-empty">Выберите беседу для просмотра сообщений</p>
            </div>

            <div id="message-form" class="chat-input-wrap is-hidden">
                <textarea id="message-input" class="form-input form-textarea"
                          placeholder="Написать сообщение... (новая строка Shift+Enter)" rows="2"></textarea>
                <button id="send-button" class="btn btn-primary" type="button">
                    <i data-lucide="send"></i>
                    Отправить
                </button>
            </div>

        </section>

    </div>

</main>

<!-- ========================================================================= -->
<!-- === 🧱 3. СКРИПТЫ === -->
<!-- ========================================================================= -->

<!-- Core -->
<script src="../assets/js/core/constants.js?v=release"></script>
<script src="../assets/js/core/api_client.js?v=release"></script>
<script src="../assets/js/core/page_registry.js?v=release"></script>
<script src="../assets/js/core/router.js?v=release"></script>
<script src="../assets/js/core/auth_guard.js?v=release"></script>
<script src="../assets/js/core/notification.js?v=release"></script>
<script src="../assets/js/core/utils.js?v=release"></script>

<!-- Services -->
<script src="../assets/js/services/auth_service.js?v=release"></script>
<script src="../assets/js/services/social_service.js?v=release"></script>

<!-- Components -->
<script src="../assets/js/components/navigation_component.js?v=release"></script>
<script src="../assets/js/components/empty_state_component.js?v=release"></script>
<script src="../assets/js/components/conversation_row_component.js?v=release"></script>
<script src="../assets/js/components/chat_bubble_component.js?v=release"></script>

<!-- Page -->
<script src="../assets/js/pages/messages.js?v=release"></script>

</body>
</html>
